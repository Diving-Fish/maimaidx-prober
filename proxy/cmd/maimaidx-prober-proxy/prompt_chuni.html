<!DOCTYPE html>
<html lang="zh-CN" data-game="chuni">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="referrer" content="no-referrer">
<title>中二节奏成绩导入</title>
<style>
:root {
  --c-bg-1: #fff5ec;
  --c-bg-2: #ffe4d4;
  --c-fg: #2d1b14;
  --c-muted: #7a5e4f;
  --c-card: rgba(255,255,255,0.85);
  --c-border: rgba(228,98,52,0.25);
  --c-accent-1: #ff7a36;
  --c-accent-2: #ff2d55;
  --c-bar-track: rgba(255,122,54,0.15);
  --c-warn: #c47700;
  --c-error: #c81d3a;
  --c-info: #5a4d44;
  --c-success: #2e9b5a;
  --c-shadow: 0 6px 24px rgba(255,122,54,0.18);
}
@media (prefers-color-scheme: dark) {
:root {
  --c-bg-1: #1f120b;
  --c-bg-2: #160a05;
  --c-fg: #ffe8d8;
  --c-muted: #d0b29f;
  --c-card: rgba(56,30,18,0.75);
  --c-border: rgba(255,122,54,0.3);
  --c-bar-track: rgba(255,255,255,0.08);
  --c-warn: #f0b04a;
  --c-error: #ff6680;
  --c-info: #e0cdb8;
  --c-success: #6cd99a;
  --c-shadow: 0 6px 24px rgba(0,0,0,0.5);
}
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
  color: var(--c-fg);
  background:
    radial-gradient(circle at 20% 0%, var(--c-bg-2), transparent 60%),
    radial-gradient(circle at 80% 100%, var(--c-bg-2), transparent 60%),
    var(--c-bg-1);
  padding: 24px 16px 48px;
  -webkit-font-smoothing: antialiased;
}
.wrap { max-width: 540px; margin: 0 auto; }
header { text-align: center; margin-bottom: 20px; }
h1 {
  font-size: 22px;
  margin: 0 0 6px;
  background: linear-gradient(90deg, var(--c-accent-1), var(--c-accent-2));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-weight: 700;
}
.subtitle { font-size: 13px; color: var(--c-muted); line-height: 1.6; margin: 0; }
.card {
  background: var(--c-card);
  border: 1px solid var(--c-border);
  border-radius: 16px;
  padding: 20px;
  box-shadow: var(--c-shadow);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.card + .card { margin-top: 16px; }
.status-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; font-size: 14px;
}
.stage-label { font-weight: 600; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.count { color: var(--c-muted); font-variant-numeric: tabular-nums; margin-left: 12px; flex-shrink: 0; }
.bar { height: 14px; border-radius: 999px; background: var(--c-bar-track); overflow: hidden; position: relative; }
.bar-fill {
  height: 100%; width: 0%; border-radius: 999px;
  background: linear-gradient(90deg, var(--c-accent-1), var(--c-accent-2));
  transition: width 0.4s cubic-bezier(.2,.8,.2,1);
  position: relative; overflow: hidden;
}
.bar-fill::after {
  content: ""; position: absolute; inset: 0;
  background-image: repeating-linear-gradient(-45deg, rgba(255,255,255,0.18) 0 8px, transparent 8px 16px);
  animation: stripes 1.2s linear infinite;
}
@keyframes stripes { from { background-position: 0 0; } to { background-position: 32px 0; } }
.bar.indeterminate .bar-fill {
  width: 35% !important; animation: slide 1.6s ease-in-out infinite;
}
@keyframes slide {
  0% { transform: translateX(-120%); }
  100% { transform: translateX(340%); }
}
.bar.done .bar-fill::after { animation: none; opacity: 0; }
.hint { margin-top: 10px; font-size: 12px; color: var(--c-muted); line-height: 1.5; }
.banner { display: none; margin-top: 14px; padding: 10px 14px; border-radius: 12px; font-size: 13px; font-weight: 600; }
.banner.show { display: block; }
.banner.success { background: rgba(46,155,90,0.12); color: var(--c-success); border: 1px solid rgba(46,155,90,0.3); }
.banner.error   { background: rgba(200,29,58,0.12); color: var(--c-error);   border: 1px solid rgba(200,29,58,0.3); }
details.log { margin-top: 6px; }
details.log summary {
  cursor: pointer; font-size: 13px; color: var(--c-muted);
  user-select: none; outline: none; padding: 8px 0;
}
details.log summary::-webkit-details-marker { display: none; }
.log-list {
  list-style: none; margin: 8px 0 0; max-height: 240px; overflow-y: auto;
  font-size: 12px; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
  border-radius: 10px; background: rgba(0,0,0,0.04); padding: 8px 10px;
}
@media (prefers-color-scheme: dark) { .log-list { background: rgba(255,255,255,0.04); } }
.log-list li { padding: 3px 0; line-height: 1.4; word-break: break-all; border-bottom: 1px dashed rgba(127,127,127,0.15); }
.log-list li:last-child { border-bottom: none; }
.log-list li.warn  { color: var(--c-warn); }
.log-list li.error { color: var(--c-error); }
.log-list li.info  { color: var(--c-info); }
.log-list li time { color: var(--c-muted); margin-right: 6px; font-variant-numeric: tabular-nums; }
.conn-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: #c0c0c0; margin-right: 6px; vertical-align: 1px; transition: background 0.3s;
}
.conn-dot.ok  { background: var(--c-success); box-shadow: 0 0 6px rgba(46,155,90,0.6); }
.conn-dot.bad { background: var(--c-error); }
.foot { margin-top: 18px; text-align: center; font-size: 11px; color: var(--c-muted); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>中二节奏成绩导入中</h1>
    <p class="subtitle">已成功访问代理，正在从 Wahlap 服务器抓取并提交您的成绩，请保持页面打开。</p>
  </header>

  <section class="card">
    <div class="status-row">
      <span class="stage-label" id="stage">等待开始……</span>
      <span class="count" id="count"></span>
    </div>
    <div class="bar indeterminate" id="bar"><div class="bar-fill" id="barFill"></div></div>
    <p class="hint"><span class="conn-dot" id="conn"></span><span id="connText">正在连接进度通道…</span></p>
    <div class="banner success" id="bannerSuccess">导入完成，您可以关闭此页面。</div>
    <div class="banner error" id="bannerError"></div>
  </section>

  <section class="card">
    <details class="log" open>
      <summary>实时日志</summary>
      <ul class="log-list" id="logList"></ul>
    </details>
  </section>

  <p class="foot">maimaidx-prober · 进度由代理通过 WebSocket 推送</p>
</div>

<script>
(function () {
  var WS_PATH = "{{.WSPath}}";
  var stageEl = document.getElementById("stage");
  var countEl = document.getElementById("count");
  var barEl   = document.getElementById("bar");
  var fillEl  = document.getElementById("barFill");
  var logEl   = document.getElementById("logList");
  var connEl  = document.getElementById("conn");
  var connTxt = document.getElementById("connText");
  var okEl    = document.getElementById("bannerSuccess");
  var errEl   = document.getElementById("bannerError");
  var done = false;

  function fmtTime(ms) {
    var d = ms ? new Date(ms) : new Date();
    var pad = function (n) { return n < 10 ? "0" + n : "" + n; };
    return pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());
  }
  function pushLog(level, msg, ts) {
    var li = document.createElement("li");
    li.className = level || "info";
    var t = document.createElement("time");
    t.textContent = fmtTime(ts);
    li.appendChild(t);
    li.appendChild(document.createTextNode(msg));
    logEl.appendChild(li);
    while (logEl.childElementCount > 200) logEl.removeChild(logEl.firstChild);
    logEl.scrollTop = logEl.scrollHeight;
  }
  function setProgress(cur, total) {
    if (total > 0) {
      barEl.classList.remove("indeterminate");
      var pct = Math.max(0, Math.min(100, (cur / total) * 100));
      fillEl.style.width = pct.toFixed(2) + "%";
      countEl.textContent = cur + " / " + total;
    }
  }
  function setStage(s) { if (s) stageEl.textContent = s; }
  function markDone() {
    done = true;
    barEl.classList.remove("indeterminate");
    barEl.classList.add("done");
    fillEl.style.width = "100%";
    okEl.classList.add("show");
    stageEl.textContent = "导入完成";
  }
  function setConn(state, text) {
    connEl.className = "conn-dot " + (state || "");
    connTxt.textContent = text;
  }

  var attempt = 0;
  function connect() {
    var url = (location.protocol === "https:" ? "wss://" : "ws://") + location.host + WS_PATH;
    setConn("", "正在连接进度通道…");
    var ws;
    try { ws = new WebSocket(url); }
    catch (e) { scheduleReconnect(); return; }
    ws.onopen = function () { attempt = 0; setConn("ok", "进度通道已连接"); };
    ws.onmessage = function (e) {
      var ev;
      try { ev = JSON.parse(e.data); } catch (_) { return; }
      switch (ev.type) {
        case "start":
          setStage("准备开始……");
          setProgress(0, ev.total || 0);
          okEl.classList.remove("show");
          errEl.classList.remove("show");
          break;
        case "step":
          setStage(ev.stage || "");
          setProgress(ev.current || 0, ev.total || 0);
          break;
        case "log":
          pushLog(ev.level || "info", ev.message || "", ev.time);
          break;
        case "done":
          setProgress(ev.total || 1, ev.total || 1);
          markDone();
          break;
        case "error":
          errEl.textContent = ev.message || "发生错误";
          errEl.classList.add("show");
          break;
      }
    };
    ws.onclose = function () {
      if (done) { setConn("ok", "已完成，连接关闭"); return; }
      setConn("bad", "进度通道已断开，正在重连…");
      scheduleReconnect();
    };
    ws.onerror = function () { try { ws.close(); } catch (_) {} };
  }
  function scheduleReconnect() {
    if (done) return;
    if (attempt >= 6) { setConn("bad", "无法连接进度通道，请刷新本页"); return; }
    var delay = Math.min(1000 * Math.pow(2, attempt), 10000);
    attempt++;
    setTimeout(connect, delay);
  }
  connect();
})();
</script>
</body>
</html>
