name: Build Docs
run-name: Build Docs
on:
  push:
    branches:
      - "*"
    paths:
      - "doc/**"
jobs:
  docs:
    name: Build docs CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: doc
        run: npm install
      - name: Build docs
        working-directory: doc
        run: bash build.sh